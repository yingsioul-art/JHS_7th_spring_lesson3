<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>L3 How Do You Celebrate the New Year?</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter','Microsoft JhengHei',sans-serif;background:#f0f4f8;color:#1a1a2e;line-height:1.6}
.app{max-width:680px;margin:0 auto;padding:0 12px 80px}
header{background:linear-gradient(135deg,#0d9488,#0f766e);color:#fff;padding:16px;border-radius:0 0 16px 16px;margin-bottom:16px;text-align:center}
header h1{font-size:18px;font-weight:700}
header p{font-size:13px;opacity:.85;margin-top:4px}
.streak{display:inline-block;background:rgba(255,255,255,.2);padding:4px 12px;border-radius:20px;font-size:12px;margin-top:8px}
.nav{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;justify-content:center}
.nav button{border:none;background:#fff;padding:8px 10px;border-radius:10px;font-size:12px;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.1);transition:all .2s}
.nav button:hover{transform:translateY(-1px);box-shadow:0 3px 8px rgba(0,0,0,.15)}
.nav button.active{background:#0d9488;color:#fff}
.unit{display:none;background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:16px}
.unit.show{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.card{background:linear-gradient(135deg,#f0fdfa,#ccfbf1);border-radius:14px;padding:20px;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform .3s;position:relative;border:1px solid #99f6e4}
.card:hover{transform:scale(1.01)}
.card .num{position:absolute;top:10px;left:14px;font-size:11px;color:#888}
.card .en{font-size:26px;font-weight:700;color:#134e4a;margin:8px 0}
.card .pos{font-size:13px;color:#0d9488;margin-bottom:4px}
.card .zh{font-size:18px;color:#555}
.card .ex{font-size:13px;color:#666;margin-top:8px;text-align:center;font-style:italic;max-width:90%}
.card .chunks{margin-top:12px;width:100%;font-size:13px}
.card .chunks div{padding:4px 0;border-bottom:1px dashed #ddd;display:flex;justify-content:space-between}
.card .chunks div:last-child{border:none}
.card .chunks .ch-en{color:#134e4a}
.card .chunks .ch-zh{color:#888;font-size:12px}
.card-nav{display:flex;justify-content:center;align-items:center;gap:16px;margin-top:14px}
.card-nav button{border:none;background:#0d9488;color:#fff;width:40px;height:40px;border-radius:50%;font-size:18px;cursor:pointer;transition:background .2s}
.card-nav button:hover{background:#0f766e}
.card-nav span{font-size:14px;color:#666}
.speak-btn{border:none;background:none;font-size:18px;cursor:pointer;padding:4px;transition:transform .2s}
.speak-btn:hover{transform:scale(1.2)}
.range-box{background:#fff;border-radius:14px;padding:16px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.range-tabs{display:flex;gap:4px;margin-bottom:12px}
.range-tabs button{flex:1;border:1px solid #ddd;background:#f8f9fa;padding:6px;border-radius:8px;font-size:12px;cursor:pointer}
.range-tabs button.active{background:#0d9488;color:#fff;border-color:#0d9488}
.range-cat{display:flex;gap:6px;flex-wrap:wrap}
.range-cat button{padding:6px 12px;border:1px solid #ddd;border-radius:8px;font-size:12px;cursor:pointer;background:#fff}
.range-cat button.active{background:#ccfbf1;border-color:#0d9488;color:#0d9488}
.range-num{display:flex;flex-wrap:wrap;gap:4px}
.range-num button{width:36px;height:36px;border:1px solid #ddd;border-radius:8px;font-size:12px;cursor:pointer;background:#fff}
.range-num button.active{background:#0d9488;color:#fff;border-color:#0d9488}
.range-custom{margin-top:8px}
.range-custom input{width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px}
.quiz-option{display:block;width:100%;text-align:left;padding:12px 16px;margin:6px 0;border:2px solid #e0e7ff;border-radius:10px;background:#fff;font-size:15px;cursor:pointer;transition:all .2s}
.quiz-option:hover{border-color:#0d9488;background:#f0fdfa}
.quiz-option.correct{border-color:#22c55e;background:#f0fdf4;color:#166534}
.quiz-option.wrong{border-color:#ef4444;background:#fef2f2;color:#991b1b}
.quiz-option:disabled{cursor:default}
.fill-input{border:none;border-bottom:2px solid #0d9488;background:transparent;font-size:16px;padding:4px 8px;width:120px;outline:none;text-align:center;font-family:inherit}
.fill-input.correct{border-color:#22c55e;color:#166534}
.fill-input.wrong{border-color:#ef4444;color:#991b1b}
.progress{height:6px;background:#e5e7eb;border-radius:3px;margin:12px 0;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,#0d9488,#22c55e);border-radius:3px;transition:width .4s}
.score-box{text-align:center;padding:20px;background:linear-gradient(135deg,#f0fdf4,#ecfdf5);border-radius:14px;margin-top:16px}
.score-box .score{font-size:48px;font-weight:700;color:#22c55e}
.score-box p{color:#555;margin-top:8px}
.btn{padding:10px 20px;border:none;border-radius:10px;font-size:14px;cursor:pointer;font-weight:600;transition:all .2s}
.btn-primary{background:#0d9488;color:#fff}.btn-primary:hover{background:#0f766e}
.btn-reset{background:#f1f5f9;color:#64748b}.btn-reset:hover{background:#e2e8f0}
.btn-sm{padding:6px 14px;font-size:12px}
.flex-center{display:flex;justify-content:center;gap:8px;margin-top:12px}
.tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;margin:2px}
.dialogue-line{padding:12px;margin:6px 0;border-radius:10px;border-left:4px solid #0d9488}
.dialogue-line.scene{background:#f8f9fa;border-left-color:#94a3b8;font-style:italic;font-size:13px}
.dialogue-line .speaker{font-weight:700;color:#0d9488;font-size:13px}
.dialogue-line .en-text{margin:4px 0}
.dialogue-line .zh-text{font-size:13px;color:#888}
.dialogue-line .note{font-size:12px;color:#666;background:#f0fdfa;padding:6px 10px;border-radius:6px;margin-top:6px}
.toggle-row{display:flex;gap:8px;margin-bottom:12px}
.toggle-btn{flex:1;padding:8px;border:2px solid #e0e7ff;border-radius:10px;background:#fff;font-size:13px;cursor:pointer;text-align:center}
.toggle-btn.active{border-color:#0d9488;background:#ccfbf1;color:#0d9488}
.reading-para{background:#f0fdfa;border-radius:12px;padding:16px;margin:10px 0;border:1px solid #99f6e4}
.reading-para h3{font-size:14px;color:#0d9488;margin-bottom:8px}
.reading-para .r-en{font-size:14px;line-height:1.8;margin-bottom:8px}
.reading-para .r-zh{font-size:13px;color:#888;line-height:1.7}
.reading-para .r-notes{margin-top:8px;font-size:12px;color:#666}
.reading-para .r-notes div{padding:3px 0;border-bottom:1px dashed #eee}
.canvas-area{border:2px dashed #cbd5e1;border-radius:12px;background:#fff;margin:10px 0}
.canvas-area canvas{display:block;width:100%;touch-action:none}
.grammar-box{background:#f0fdfa;border-radius:12px;padding:14px;margin:8px 0;border:1px solid #99f6e4}
.grammar-box h4{color:#0d9488;margin-bottom:6px;font-size:14px}
.grammar-box code{background:#fff;padding:2px 6px;border-radius:4px;font-size:13px;color:#e11d48}
.explain{font-size:13px;color:#555;background:#f8fafb;padding:10px 14px;border-radius:8px;margin-top:8px;border-left:3px solid #0d9488;display:none}
.explain.show{display:block;animation:fadeIn .3s}
.shuffle-toggle{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:13px}
.shuffle-toggle input{accent-color:#0d9488}
.unit h2{font-size:17px;font-weight:700;color:#134e4a;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.hint-text{font-size:13px;color:#888;text-align:center;margin:8px 0}
.answer-reveal{font-size:14px;color:#22c55e;font-weight:600;margin-top:6px}
.wrong-list{margin-top:14px}
.wrong-list .wrong-item{background:#fef2f2;border-radius:8px;padding:10px;margin:6px 0;font-size:13px}
.wrong-list .wrong-item .q{color:#991b1b;font-weight:600}
.wrong-list .wrong-item .a{color:#166534;margin-top:4px}
@media(max-width:400px){.card .en{font-size:22px}.nav button{padding:6px 8px;font-size:11px}}
</style>
</head>
<body>
<header>
<h1>📖 L3 How Do You Celebrate the New Year?</h1>
<p>南一版 七年級下學期</p>
<div class="streak" id="streakBadge">🔥 連續 1 天</div>
</header>
<div class="app">
<div class="nav" id="mainNav"></div>
<div id="rangeBox" class="range-box" style="display:none">
<div class="range-tabs">
<button onclick="setRangeTab(0)" id="rt0">📚 按類別</button>
<button onclick="setRangeTab(1)" id="rt1">🔢 按序號</button>
<button onclick="setRangeTab(2)" id="rt2">✏️ 自訂</button>
</div>
<div id="rangeContent"></div>
</div>
<div id="unitContainer"></div>
</div>
<script src="L3_data.js"></script>
<script src="L3_app.js"></script>
</body>
</html>
